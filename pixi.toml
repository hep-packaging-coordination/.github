[workspace]
channels = ["conda-forge"]
name = "github-org-profile"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[activation]
scripts = ["setup.sh"]

[tasks]
update = "python ./update_readme.py"
lint = "pre-commit run --all-files"
test = "pytest tests/ -v"

[tasks.start]
depends-on = ["update", "lint"]

[tasks.check]
depends-on = ["test", "lint"]

[dependencies]
python = ">=3.14.4,<3.15"
requests = ">=2.33.1,<3"
pre-commit = ">=4.5.1,<5"
pytest = ">=8,<9"
responses = ">=0.25,<0.26"
jsonschema = ">=4,<5"
