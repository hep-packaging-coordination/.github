[workspace]
channels = ["conda-forge"]
name = "github-org-profile"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[activation]
scripts = ["setup.sh"]

[tasks.audit-fix]
cmd = "npm audit fix"
cwd = "site"
description = "Update dependencies to resolve security vulnerabilities"

[tasks.update]
cmd = "python ./update_readme.py && (pre-commit run --files profile/README.md site/src/data/tools.json || exit 0)"
inputs = ["feedstocks.json", "update_readme.py", "feedstock_data.py"]
outputs = ["profile/README.md", "site/src/data/tools.json"]
description = "Regenerate profile/README.md and site/src/data/tools.json from live conda-forge data"

[tasks.site-install]
cmd = "npm install"
cwd = "site"
description = "Install site npm dependencies"
inputs = ["site/package.json", "site/package-lock.json"]
outputs = ["site/node_modules/.package-lock.json"]

[tasks.site-dev]
cmd = "npm run dev"
cwd = "site"
description = "Start Astro dev server at http://localhost:4321/.github/"
depends-on = ["site-install"]

[tasks.site-build]
cmd = "npm run build"
cwd = "site"
description = "Build static site to site/dist/"
depends-on = ["update", "site-install"]
inputs = ["site/src/data/tools.json", "site/src"]
outputs = ["site/dist/index.html"]

[tasks.site-preview]
cmd = "npm run preview"
cwd = "site"
description = "Serve production build at http://localhost:4321/.github/"
depends-on = ["site-build"]

[tasks.site-format]
cmd = "npm run format"
cwd = "site"
description = "Auto-format site source files (Astro, Svelte, Tailwind)"
depends-on = ["site-install"]

[tasks.site-format-check]
cmd = "npm run format-check"
cwd = "site"
description = "Check site formatting without writing changes (CI-safe)"
depends-on = ["site-install"]

[tasks.site-lint]
cmd = "npm run lint"
cwd = "site"
description = "Lint Astro/Svelte components"
depends-on = ["site-install"]

[tasks.site-test]
cmd = "npm run test"
cwd = "site"
description = "Vitest unit tests: site TypeScript logic (filterTools, countByCategory, withBase)"
depends-on = ["site-install"]

[tasks.site-e2e]
cmd = "npx playwright test"
cwd = "site"
description = "Playwright browser tests: loads the real built site in Chromium and checks search, filters, base-path"
depends-on = ["site-install", "site-build"]

[tasks.linkcheck]
cmd = "lychee --root-dir site/dist site/dist/"
description = "Check for broken links in the built site"
depends-on = ["site-build"]

[tasks.start]
depends-on = ["site-preview"]
description = "Fresh start: regenerate data, build, and serve at http://localhost:4321/.github/"

[tasks.format]
cmd = "pre-commit run --all-files"
depends-on = ["site-format"]
description = "Auto-format all source files: Prettier for site, then pre-commit hooks (ruff, etc.)"

[tasks.lint]
depends-on = ["site-format-check", "site-lint"]
description = "Check all formatting and linting without modifying files (CI-safe)"

[tasks.test]
depends-on = ["test-python", "site-test", "site-e2e"]
description = "Run all tests: Python data pipeline (pytest), site logic (vitest), browser (Playwright)"

[tasks.test-python]
cmd = "pytest tests/ -v"
description = "Python-only tests for the data pipeline (feedstock_data.py, update_readme.py)"

[tasks.check]
depends-on = ["lint", "test", "linkcheck"]
description = "Full CI gate: lint (check-only) + all tests + broken-link check"

[dependencies]
python = ">=3.14.4,<3.15"
requests = ">=2.33.1,<3"
pre-commit = ">=4.5.1,<5"
pytest = ">=8,<9"
responses = ">=0.25,<0.26"
jsonschema = ">=4,<5"
nodejs = ">=22,<23"
lychee = ">=0.23,<0.25"
